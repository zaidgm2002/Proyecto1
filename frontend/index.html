<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Diaria</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Clerk Auth Section -->
  <div id="authSection" class="container mx-auto px-4 py-8 max-w-md">
    <div id="clerk-auth"></div>
  </div>

  <!-- Agenda Section -->
  <div id="agendaSection" class="container mx-auto px-4 py-8 max-w-2xl hidden">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Agenda Diaria</h1>
      <div class="flex gap-2">
        <button id="mapaBtn" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">
          📍 Mapa
        </button>
        <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
          Cerrar Sesión
        </button>
      </div>
    </div>
    
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">Nuevo Evento</h2>
      <form id="eventoForm" class="space-y-4">
        <div>
          <label class="block text-gray-600 mb-1">Título *</label>
          <input type="text" id="titulo" required 
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Descripción</label>
          <textarea id="descripcion" rows="2"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Fecha *</label>
          <input type="date" id="fecha" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Hora</label>
          <input type="time" id="hora"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" 
          class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
          Agregar Evento
        </button>
      </form>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">Eventos</h2>
      <div id="eventosList" class="space-y-3">
        <p class="text-gray-500 text-center">No hay eventos</p>
      </div>
    </div>
  </div>

  <!-- Map Section -->
  <div id="mapSection" class="container mx-auto px-4 py-8 max-w-4xl hidden">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Mapa</h1>
      <div class="flex gap-2">
        <button id="backToAgendaBtn" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">
          ← Volver a Agenda
        </button>
        <button id="logoutBtnMap" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
          Cerrar Sesión
        </button>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <div class="flex gap-4 mb-4">
        <button id="getLocationBtn" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">
          📍 Obtener mi ubicación
        </button>
        <div id="locationStatus" class="text-gray-600 self-center"></div>
      </div>
      <div id="map" class="h-96 w-full rounded-lg border border-gray-300"></div>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">Información de ubicación</h2>
      <div id="locationInfo" class="space-y-2">
        <p class="text-gray-500">Haz clic en "Obtener mi ubicación" para ver tu posición en el mapa</p>
      </div>
    </div>
  </div>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_c3VidGxlLXN3YW4tNjcuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://subtle-swan-67.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    id="clerk-script"
    type="text/javascript"
  ></script>
  <script src="app.js"></script>
</body>
</html>
