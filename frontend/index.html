<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Diaria</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Login Section -->
  <div id="loginSection" class="container mx-auto px-4 py-8 max-w-md">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Iniciar Sesión</h1>
    
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-gray-600 mb-1">Email *</label>
          <input type="email" id="loginEmail" required 
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Password *</label>
          <input type="password" id="loginPassword" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" 
          class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
          Iniciar Sesión
        </button>
      </form>
    </div>

    <div class="text-center">
      <p class="text-gray-600">¿No tienes cuenta? </p>
      <button id="showRegisterBtn" class="text-blue-500 hover:text-blue-700 font-semibold">
        Registrarse
      </button>
    </div>
  </div>

  <!-- Register Section -->
  <div id="registerSection" class="container mx-auto px-4 py-8 max-w-md hidden">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Registrarse</h1>
    
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <form id="registerForm" class="space-y-4">
        <div>
          <label class="block text-gray-600 mb-1">Nombre *</label>
          <input type="text" id="registerNombre" required 
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Email *</label>
          <input type="email" id="registerEmail" required 
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Password *</label>
          <input type="password" id="registerPassword" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" 
          class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
          Registrarse
        </button>
      </form>
    </div>

    <div class="text-center">
      <p class="text-gray-600">¿Ya tienes cuenta? </p>
      <button id="showLoginBtn" class="text-blue-500 hover:text-blue-700 font-semibold">
        Iniciar Sesión
      </button>
    </div>
  </div>

  <!-- Agenda Section -->
  <div id="agendaSection" class="container mx-auto px-4 py-8 max-w-2xl hidden">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Agenda Diaria</h1>
      <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
        Cerrar Sesión
      </button>
    </div>
    
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">Nuevo Evento</h2>
      <form id="eventoForm" class="space-y-4">
        <div>
          <label class="block text-gray-600 mb-1">Título *</label>
          <input type="text" id="titulo" required 
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Descripción</label>
          <textarea id="descripcion" rows="2"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Fecha *</label>
          <input type="date" id="fecha" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Hora</label>
          <input type="time" id="hora"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" 
          class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
          Agregar Evento
        </button>
      </form>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">Eventos</h2>
      <div id="eventosList" class="space-y-3">
        <p class="text-gray-500 text-center">No hay eventos</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
